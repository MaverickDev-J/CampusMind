

services:
  # ── MongoDB ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: campusmind_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: campusadmin
      MONGO_INITDB_ROOT_PASSWORD: campuspass123
      MONGO_INITDB_DATABASE: campusmind
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s   # First boot with auth init takes longer

  # ── Redis Stack (includes RedisJSON, RediSearch) ─────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: campusmind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (DB admin UI) ──────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: campusmind_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: campusadmin
      ME_CONFIG_MONGODB_ADMINPASSWORD: campuspass123
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: campusadmin
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
